services:
  tglabs:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm run build && npm run start -- -p 3000"
    volumes:
      - /root/tglabs:/app
    env_file:
      - /root/tglabs/.env.local
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000', res => process.exit(res.statusCode === 200 ? 0 : 1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    labels:
      - traefik.enable=true
      - traefik.http.routers.tglabs.rule=Host(`tglabs.info`) || Host(`www.tglabs.info`)
      - traefik.http.routers.tglabs.entrypoints=websecure
      - traefik.http.routers.tglabs.tls.certresolver=letsencrypt
      - traefik.http.services.tglabs.loadbalancer.server.port=3000
    restart: unless-stopped
    network_mode: host

networks: {}